# pre-commit (https://pre-commit.com) — local quality gate before push.
# Mirror the CI lint-extra job so CI failures are caught locally.
# All hook revs are pinned to immutable tags per the official guidance.
# Update with `pre-commit autoupdate`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(\.mumei/|docs/|examples/|CODE_OF_CONDUCT\.md)
      - id: end-of-file-fixer
        exclude: ^(\.mumei/|docs/|examples/|CODE_OF_CONDUCT\.md)
      - id: check-yaml
        exclude: ^\.mumei/
      - id: check-json
        exclude: ^\.mumei/
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        exclude: ^(\.mumei/|docs/|examples/|CODE_OF_CONDUCT\.md|\.markdownlint-cli2\.jsonc)

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint-cli2.jsonc"]

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        # use _typos.toml from repo root
        pass_filenames: false

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-d", "-i", "2"]

  # shellcheck via locally-installed binary (system) — avoids the Docker
  # dependency that koalaman/shellcheck-precommit imposes (it runs the
  # checker in a container, which fails on hosts without Docker).
  # Contributors must `brew install shellcheck` (or distro equivalent).
  # `-x` follows external `source` directives so cross-file declarations
  # are honored. tests/ is excluded because bats files exercise idioms
  # (subshell PATH manipulation, intentional `ls -i` for inode reads,
  # export-with-command-substitution helpers) that conflict with shellcheck's
  # static analysis but are correct in the bats execution model.
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck (system)
        entry: shellcheck -x
        language: system
        types: [shell]
        exclude: ^tests/
        require_serial: false

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.90.10
    hooks:
      - id: trufflehog
        name: trufflehog (filesystem)
        # Scan the working tree only on commit. Verified-only results
        # to keep the noise floor low; the weekly gitleaks-weekly
        # workflow does the deeper full-repo pass against history.
        entry: bash -c 'trufflehog filesystem --no-update --fail --no-verification --results=verified .'
        language: system

  # Run the project's own bats suite locally so test failures land
  # before push, not at CI time. Mirrors the `bats -r tests/` job in
  # ci.yml. Slow-ish on full suite but tests/ is small enough to keep
  # under 10 s on this repo.
  - repo: local
    hooks:
      - id: bats
        name: bats (full suite)
        entry: bats -r tests/
        language: system
        pass_filenames: false
        types_or: [shell, file]
        # Trigger on bash / hook script / bats edits. Skip pure-doc
        # commits so README typo fixes don't pay the bats cost.
        files: '^(hooks/|scripts/|tests/|.pre-commit-config\.yaml$)'

  # Run the same lychee link check ci.yml uses so broken-link / 404
  # errors surface before push. Same lychee.toml drives both.
  - repo: local
    hooks:
      - id: lychee
        name: lychee (link check)
        entry: lychee --no-progress
        language: system
        pass_filenames: true
        files: '\.md$'
        # Fail-fast on commits that touch markdown only (most common
        # cause of 404 introduction).
