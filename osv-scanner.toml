# OSV-Scanner configuration consumed by .github/workflows/osv-scanner.yml
# (and any local `osv-scanner --recursive .` invocation). Vulnerabilities
# listed here are intentionally ignored after a documented exploit-path
# assessment. Each entry must carry a `reason` and a finite
# `ignoreUntil` so the bypass is revisited rather than accumulated.

[[IgnoredVulns]]
id = "CVE-2026-0994"
ignoreUntil = 2027-05-23
reason = """
GHSA-7gcm-g887-7qv7: DoS via google.protobuf.json_format.ParseDict()
on attacker-controlled deeply-nested Any messages (RecursionError).

Path: protobuf==4.25.9 is a transitive dependency of semgrep==1.111.0
(see .github/requirements/semgrep-review/requirements.txt), pulled in
via opentelemetry-proto==1.25.0 which hard-pins protobuf<5. semgrep
1.111.0 is frozen for review-pipeline grounding-signal stability
(.github/requirements/semgrep-review/requirements.in); bumping to a
semgrep release that ships protobuf>=5.29.6 would break that freeze.

Exploit path in mumei: none. The review pipeline runs semgrep against
trusted source files in this repository (sh, md, yml); no untrusted
protobuf JSON ever reaches ParseDict() in this context. semgrep's
own use of protobuf is internal telemetry and not exposed to PR-author
input. Reassess on 2027-05-23 — by then the review pipeline should
have moved off 1.111.0 anyway, or the upstream advisory should have
been backported to the 4.25.x line.
"""

# --- PyJWT 2.12.1 advisory cluster (all fixed in pyjwt 2.13.0) ---
# Shared path + assessment for the four entries below:
#   pyjwt==2.12.1 is a transitive dependency of semgrep==1.163.0 (via mcp
#   and semgrep itself) in .github/requirements/semgrep-release/
#   requirements.txt, consumed only by release-reusable.yml's supply-chain
#   scan step. mumei never imports PyJWT and never verifies, decodes, or
#   fetches JWTs / JWKS; semgrep's own use is internal and not exposed to
#   PR-author input, so none of the four exploit paths (PyJWKClient SSRF,
#   unbounded JWKS refetch DoS, detached-JWS decode, algorithm/JWK-use
#   confusion) is reachable here.
# Real fix (deferred): regenerate the semgrep-release lock with
#   `pyjwt>=2.13.0` (needs the Python 3.14 pip-compile toolchain documented
#   in requirements.in; out of scope for this change). The short
#   ignoreUntil forces that bump rather than letting the bypass linger.

[[IgnoredVulns]]
