name: osv-scanner

# Cross-ecosystem vulnerability scanner from Google. Scans every
# dependency manifest in the repo against the OSV database (npm,
# pip, go, cargo, etc.). mumei has both shell (no manifest) and the
# dashboard npm package, so OSV gives broader coverage than a single-
# ecosystem tool would. CodeQL already runs from ci.yml; this
# workflow specifically targets known CVEs in declared dependencies.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Wed 06:00 UTC — off-peak vs. CodeQL (Mon) / Scorecards (Mon) /
    # gitleaks-weekly (Mon).
    - cron: "0 6 * * 3"
  workflow_dispatch:

permissions: read-all

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      # Point osv-scanner at the repo-level osv-scanner.toml so its
      # `IgnoredVulns` block (CVE entries with documented exploit-path
      # assessment + a finite `ignoreUntil`) is honoured. The reusable
      # workflow's default scan-args is empty, so without this flag
      # the CLI does not auto-discover the config file from the runner's
      # CWD layout. Pass `./` last so the recursive scan target is
      # explicit alongside the config flag.
      scan-args: |-
        --config=osv-scanner.toml
        ./
    permissions:
      contents: read
      security-events: write
      actions: read
