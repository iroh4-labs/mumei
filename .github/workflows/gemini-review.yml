name: gemini-review

# Auto re-review on every push to a PR. The official gemini-code-assist
# GitHub App auto-reviews on `pull_request:opened` only — subsequent
# pushes need a manual `/gemini review` comment. This workflow closes
# that gap by running `google-github-actions/run-gemini-cli` with the
# `code-review` extension on the `synchronize` event so PR updates get
# the same automatic-review UX as Codex.
#
# Trigger surface is intentionally narrow:
#   - `synchronize`: subsequent push (the case the App misses)
#   - `reopened`:    closed → reopen (App behavior here is unclear)
#   - `ready_for_review`: draft → ready (App sees it as a fresh open)
# `opened` is deliberately excluded so the App's initial review keeps
# its monopoly on first-PR review (preserves styleguide.md handling and
# avoids duplicate posts).
#
# Authentication: a Google AI Studio API key stored as the repo secret
# `GEMINI_API_KEY`. Free tier covers personal projects (Pro 50 req/day,
# Flash 1,500 req/day). If the secret is missing the workflow fails
# loud at the action step rather than silently skipping.

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]

concurrency:
  group: gemini-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Capture pre-review state
        id: pre
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          # Snapshot existing review-comment count so the post-step can
          # detect whether this run added any inline findings.
          before=$(gh api "/repos/${REPO}/pulls/${PR}/comments" --jq 'length')
          echo "before_count=${before}" >>"$GITHUB_OUTPUT"
          echo "Pre-review inline comment count: ${before}"

      - name: Prepare Gemini context
        env:
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -u
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            --arg context "automated review on push (synchronize event)" \
            '{repository: $repo, pull_request_number: $pr, additional_context: $context}' \
            >.gemini/context.json

      - name: Run Gemini PR review
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0 # ratchet:exclude
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          workflow_name: gemini-review
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: /pr-code-review

      # Codex-style 👍: if Gemini posted no new inline review comments,
      # add a +1 reaction to the PR so the author can tell at a glance
      # that the review passed. The summary review (event type COMMENT)
      # is posted unconditionally by the code-review extension, so the
      # only reliable signal for "no findings" is the inline-comment
      # delta against the pre-review snapshot.
      - name: Thumbs-up if no new findings
        if: always() && steps.pre.outputs.before_count != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BEFORE: ${{ steps.pre.outputs.before_count }}
        run: |
          set -u
          after=$(gh api "/repos/${REPO}/pulls/${PR}/comments" --jq 'length')
          delta=$((after - BEFORE))
          echo "Post-review inline comment count: ${after} (delta=${delta})"
          if [ "${delta}" -eq 0 ]; then
            echo "No new inline findings — adding 👍 reaction to PR."
            gh api -X POST "/repos/${REPO}/issues/${PR}/reactions" \
              -H "Accept: application/vnd.github+json" \
              -f content='+1'
          else
            echo "${delta} new finding(s) posted — no reaction needed."
          fi
