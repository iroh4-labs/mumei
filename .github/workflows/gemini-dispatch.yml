name: gemini-dispatch

# Routes Gemini-related triggers (PR opened, PR sync, issue activity,
# `@gemini-cli` comments) to the appropriate sub-workflow:
#   - review        -> gemini-review.yml         (pull request review)
#   - triage        -> gemini-triage.yml         (issue triage)
#   - invoke        -> gemini-invoke.yml         (free-form prompt)
#
# mumei deviations from the upstream Google example:
#   1. `pull_request: types` includes `synchronize` so that Gemini
#      re-reviews each new commit on an open PR. This mirrors the
#      Copilot ruleset's "Review new pushes" toggle so reviewer
#      coverage is invariant across reviewers.
#   2. `pull_request.draft == false` gate so Drafts are skipped
#      (saves API spend; matches mumei's convention that PRs leave
#      Draft only when human-ready for review).
#   3. The `plan-execute` (autonomous merge / code-write) job from
#      the upstream example is intentionally OMITTED. mumei's
#      development rules require human-in-the-loop for any change
#      reaching `main`; an LLM-driven `/approve` path is incompatible
#      with the branch-first + PR-first + Copilot-review-wait
#      discipline documented in CONTRIBUTING.md.

on:
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  issues:
    types:
      - opened
      - reopened
  issue_comment:
    types:
      - created

defaults:
  run:
    shell: bash

jobs:
  dispatch:
    if: |-
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.fork == false &&
        github.event.pull_request.draft == false
      ) || (
        github.event_name == 'issues' &&
        contains(fromJSON('["opened", "reopened"]'), github.event.action)
      ) || (
        github.event.sender.type == 'User' &&
        startsWith(github.event.comment.body || github.event.review.body || github.event.issue.body, '@gemini-cli') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association || github.event.issue.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      command: ${{ steps.extract_command.outputs.command }}
      additional_context: ${{ steps.extract_command.outputs.additional_context }}
      issue_number: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - name: Extract command
        id: extract_command
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v9.0.0
        env:
          EVENT_TYPE: "${{ github.event_name }}.${{ github.event.action }}"
          REQUEST: "${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}"
        with:
          script: |
            const eventType = process.env.EVENT_TYPE;
            const request = process.env.REQUEST || '';

            // mumei: opened, synchronize, reopened all map to `review`.
            // synchronize fires on each new commit so Gemini re-reviews
            // every push (parity with Copilot ruleset's "Review new pushes").
            if (
              eventType === 'pull_request.opened' ||
              eventType === 'pull_request.synchronize' ||
              eventType === 'pull_request.reopened'
            ) {
              core.setOutput('command', 'review');
            } else if (['issues.opened', 'issues.reopened'].includes(eventType)) {
              core.setOutput('command', 'triage');
            } else if (request.startsWith('@gemini-cli /review')) {
              core.setOutput('command', 'review');
              const additionalContext = request.replace(/^@gemini-cli \/review/, '').trim();
              core.setOutput('additional_context', additionalContext);
            } else if (request.startsWith('@gemini-cli /triage')) {
              core.setOutput('command', 'triage');
            } else if (request.startsWith('@gemini-cli')) {
              const additionalContext = request.replace(/^@gemini-cli/, '').trim();
              core.setOutput('command', 'invoke');
              core.setOutput('additional_context', additionalContext);
            } else {
              core.setOutput('command', 'fallthrough');
            }

  review:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'review' }}
    uses: ./.github/workflows/gemini-review.yml
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    with:
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit

  triage:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'triage' }}
    uses: ./.github/workflows/gemini-triage.yml
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    with:
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit

  invoke:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'invoke' }}
    uses: ./.github/workflows/gemini-invoke.yml
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    with:
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit
