name: gemini-triage

# Reusable Gemini issue triage workflow. Called by gemini-dispatch.yml
# when an `issues.opened` / `issues.reopened` event fires, or via
# `@gemini-cli /triage` comment from an OWNER/MEMBER/COLLABORATOR.
#
# Behaviour: read all repo labels, ask Gemini to pick a relevant
# subset for the issue, then apply those labels via github-script.
# Reads issue body but does NOT pass GITHUB_TOKEN to the LLM step
# (untrusted input — defence against prompt-injection-driven token
# misuse).

on:
  workflow_call:
    inputs:
      additional_context:
        type: string
        description: Free-form context appended to the triage prompt.
        required: false

concurrency:
  group: "${{ github.workflow }}-triage-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    outputs:
      available_labels: ${{ steps.get_labels.outputs.available_labels }}
      selected_labels: ${{ steps.gemini_analysis.outputs.summary }}
    permissions:
      contents: read
      id-token: write
      issues: read
      pull-requests: read
    steps:
      - name: Get repository labels
        id: get_labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v9.0.0
        with:
          script: |-
            const labels = [];
            for await (const response of github.paginate.iterator(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })) {
              labels.push(...response.data);
            }
            if (!labels || labels.length === 0) {
              core.setFailed('There are no issue labels in this repository.')
            }
            const labelNames = labels.map(l => l.name).sort();
            core.setOutput('available_labels', labelNames.join(','));
            core.info(`Found ${labelNames.length} labels: ${labelNames.join(', ')}`);
            return labelNames;

      - name: Prepare prompt context
        run: |
          mkdir -p .gemini
          jq -n \
            --arg labels "${AVAILABLE_LABELS}" \
            --arg title "${ISSUE_TITLE}" \
            --arg body "${ISSUE_BODY}" \
            '{available_labels: $labels, issue_title: $title, issue_body: $body}' > .gemini/context.json
        env:
          AVAILABLE_LABELS: ${{ steps.get_labels.outputs.available_labels }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Run Gemini issue analysis
        id: gemini_analysis
        if: ${{ steps.get_labels.outputs.available_labels != '' }}
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          # Do NOT pass GITHUB_TOKEN here — the model sees untrusted
          # issue body. Token-mediated GitHub mutations happen in the
          # `label` job below, after the model output is sanitized.
          GITHUB_TOKEN: ""
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION }}
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          workflow_name: gemini-triage
          github_issue_number: ${{ github.event.issue.number }}
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "tools": {
                "core": []
              }
            }
          prompt: "/gemini-triage"

  label:
    runs-on: ubuntu-latest
    needs:
      - triage
    if: ${{ needs.triage.outputs.selected_labels != '' }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Mint identity token
        id: mint_identity_token
        if: ${{ vars.APP_ID }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Apply labels
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AVAILABLE_LABELS: ${{ needs.triage.outputs.available_labels }}
          SELECTED_LABELS: ${{ needs.triage.outputs.selected_labels }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v9.0.0
        with:
          github-token: ${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}
          script: |-
            // Sanitize: only keep selected labels that exist in the repo's
            // label set. Defence against prompt-injection that tries to
            // force unintended labels.
            const availableLabels = (process.env.AVAILABLE_LABELS || '').split(',')
              .map(l => l.trim())
              .sort();
            const selectedLabels = (process.env.SELECTED_LABELS || '').split(',')
              .map(l => l.trim())
              .filter(l => availableLabels.includes(l))
              .sort();
            const issueNumber = process.env.ISSUE_NUMBER;
            if (selectedLabels && selectedLabels.length > 0) {
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: selectedLabels,
              });
              core.info(`Set labels: ${selectedLabels.join(',')}`);
            } else {
              core.info('No applicable labels selected.');
            }
