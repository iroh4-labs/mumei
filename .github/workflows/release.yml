name: release

# Caller workflow: invoked when an annotated tag matching `v*` is
# pushed. Delegates the entire pipeline to release-reusable.yml so
# the high-privilege jobs (signing, SLSA provenance, GitHub release
# upload) sit behind the `release` GitHub Environment with
# required-reviewer approval.
#
# All real logic lives in release-reusable.yml; this file's only job
# is to translate a tag-push event into a workflow_call invocation.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: ./.github/workflows/release-reusable.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
