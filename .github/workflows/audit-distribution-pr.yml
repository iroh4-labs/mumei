# Audit distribution files (hooks/skills/agents/.claude-plugin) on every PR
# that touches them. Posts a single PR comment; CRITICAL findings fail CI.
# Skipped on fork PRs (secrets unavailable per GitHub policy).
name: audit-distribution-pr

on:
  pull_request:
    paths:
      - "hooks/**"
      - "skills/**"
      - "agents/**"
      - ".claude-plugin/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by claude-code-action@v1 for OIDC

concurrency:
  group: audit-distribution-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compose prompt
        id: prompt
        run: |
          {
            echo 'value<<MUMEI_PROMPT_EOF'
            cat .github/audit-prompts/distribution-audit-pr.md
            echo 'MUMEI_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Read,Glob,Grep,WebFetch,Bash(gh pr comment:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*)"
