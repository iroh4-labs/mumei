# End-to-end verification that the mumei plugin distribution is internally
# consistent. Exercises three orthogonal scenarios:
#   1. Manifest + artifact resolution
#   2. Hook script discipline
#   3. Documented .mumei/ layout vs decisions.md
# Posts a single PR comment; failures fail CI.
name: e2e-plugin-load

on:
  pull_request:
    paths:
      - "hooks/**"
      - "skills/**"
      - "agents/**"
      - ".claude-plugin/**"
      - "docs/mumei-decisions.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# Opt into Node.js 24 for transitive JS actions (actions/setup-node,
# oven-sh/setup-bun) inside claude-code-base-action. Silences the Node 20
# deprecation warning until those actions publish Node 24-compatible tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: e2e-plugin-load-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: anthropics/claude-code-base-action@e8132bc5e637a42c27763fc757faa37e1ee43b34 # beta
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/e2e-plugin-load.md
          model: sonnet
          max_turns: "40"
          allowed_tools: "Read,Glob,Grep,Bash(gh pr comment:*),Bash(jq:*)"
          # Disallow WebFetch explicitly: removing it from allowed_tools
          # alone is insufficient because the action's defaults include it.
          disallowed_tools: "WebFetch"
