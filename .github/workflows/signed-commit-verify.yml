name: signed-commit-verify

# Verify every commit on PRs targeting `main` carries a verified GPG
# or SSH signature. GitHub already exposes a verified-signatures branch
# protection setting, but it gates merge, not PR review. Running the
# check on PR open/sync surfaces unsigned commits to the contributor
# (and the maintainer) before merge time, so the contributor can
# amend/sign locally rather than discovering the gate at merge.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify signatures on every PR commit
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -u

          # Enumerate every commit that the PR introduces (base..head,
          # exclusive on base). For each, ask the GitHub API whether the
          # signature verified. `verification.verified == true` covers
          # both GPG and SSH signing equivalently.
          mapfile -t shas < <(git rev-list --no-merges "${PR_BASE_SHA}..${PR_HEAD_SHA}")

          if [ "${#shas[@]}" -eq 0 ]; then
            echo "no commits to verify (PR base == head)"
            exit 0
          fi

          # gh-api retry helper. Distinguishes transient API errors
          # (5xx, rate-limit, network) from real "verified=false" responses.
          # Transient → exponential backoff retry (1s, 2s, 4s) up to 3 attempts;
          # persistent transient → return 2 so the workflow can fail with
          # an infra-error category instead of silently treating the commit
          # as unsigned.
          # 4xx (e.g. 404 commit not found) is treated as terminal and
          # propagated as `verified=false` so the existing branch handles it.
          gh_api_verified_with_retry() {
            local sha="$1" attempts=3 i=0 last_stderr="" stdout="" rc=0
            local stderr_file
            stderr_file="$(mktemp)"
            while [ "$i" -lt "$attempts" ]; do
              stdout="$(gh api "repos/${REPO_FULL}/commits/${sha}" \
                --jq '.commit.verification.verified' 2>"$stderr_file")"
              rc=$?
              last_stderr="$(cat "$stderr_file")"
              if [ "$rc" -eq 0 ]; then
                rm -f "$stderr_file"
                printf '%s' "$stdout"
                return 0
              fi
              # 4xx is real failure (commit not found etc.) — do not retry,
              # surface as verified=false to the existing unsigned branch.
              if printf '%s' "$last_stderr" | grep -qE 'HTTP 4[0-9][0-9]'; then
                rm -f "$stderr_file"
                printf 'false'
                return 0
              fi
              i=$((i + 1))
              if [ "$i" -lt "$attempts" ]; then
                sleep $((1 << (i - 1)))
              fi
            done
            rm -f "$stderr_file"
            printf '[mumei] gh api transient failure after %d attempts (last stderr: %s)\n' \
              "$attempts" "$last_stderr" >&2
            return 2
          }

          unsigned=""
          for sha in "${shas[@]}"; do
            verified="$(gh_api_verified_with_retry "$sha")"
            api_rc=$?
            if [ "$api_rc" -eq 2 ]; then
              echo "::error::infra failure: cannot determine signed status of ${sha} after retries"
              exit 2
            fi
            if [ "$verified" != "true" ]; then
              author="$(git log -1 --format='%an <%ae>' "$sha")"
              unsigned+="${sha}  ${author}"$'\n'
            fi
          done

          if [ -n "$unsigned" ]; then
            echo "::error::Unverified commits detected on this PR:"
            printf '%s' "$unsigned"
            echo ""
            echo "Sign every commit (e.g. 'git commit -S' or 'git rebase -S') and force-push the branch."
            exit 1
          fi

          echo "all ${#shas[@]} commit(s) carry a verified signature"
