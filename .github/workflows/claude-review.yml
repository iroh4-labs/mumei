name: claude-review

# mumei dogfood: this workflow is a thin caller of the reusable
# harness-engineered review workflow (REQ-24). The reusable workflow owns the
# rubric, grounding, multi-perspective walk, bias-neutralization, and audit
# record. Keeping this caller in mumei means every PR to mumei exercises the
# exact same review path that other repositories invoke via `uses:`.
#
# Authenticate with a Claude Max subscription via CLAUDE_CODE_OAUTH_TOKEN
# (generate locally with `claude setup-token` and store as a repo secret).
# Do NOT also set ANTHROPIC_API_KEY: a static key takes precedence and would
# bill the API account.
#
# DISABLED (manual-trigger only): PR-time auto-run was turning PASS too
# early relative to other LLM reviewers (gemini-code-assist /
# chatgpt-codex-connector / copilot), so it was muting real findings.
# Kept on disk + manually invokable via `gh workflow run claude-review.yml`
# so the harness wiring is preserved and can be re-enabled by reinstating
# the pull_request trigger when the upstream rubric is tightened.

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by the action's GitHub token path (OIDC)

jobs:
  review:
    uses: ./.github/workflows/review-reusable.yml
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
