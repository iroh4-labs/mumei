name: claude-review

# Automated PR review by Anthropic's Claude Code Action, complementing the
# Codex (per-push) and Gemini (per-open) bots. Triggers on PR open AND every
# push (synchronize) — the dual-trigger Gemini lacks. Authenticates with a
# Claude Max subscription via CLAUDE_CODE_OAUTH_TOKEN (no API key, no separate
# billing). Generate the token locally with `claude setup-token` and store it
# as the CLAUDE_CODE_OAUTH_TOKEN repo secret. Do NOT also set ANTHROPIC_API_KEY:
# a static key takes precedence and would bill the API account.
#
# Uses the official code-review plugin skill (which posts inline findings to
# the PR) rather than a free-form prompt — a free-form prompt runs Claude but
# does not reliably post review comments.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by the action's token path

# One review per PR at a time; a newer push cancels the in-flight review so
# rapid pushes do not pile up (and do not waste subscription quota).
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip PRs from forks: an untrusted head could tamper with the review
    # context files (CLAUDE.md / .claude/rules), steering the reviewer
    # (prompt injection). mumei takes no external-fork PRs.
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Require the OAuth secret
        id: guard
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN not set; skipping Claude review"
            echo "skip=true" >>"$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@4481e6d3c7bbb88db2a928ca3444c536f589c7c1 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # Default is Sonnet; use Opus 4.7 for higher review quality
          # (Max 20x has ample quota headroom).
          claude_args: "--model claude-opus-4-7"
