name: claude-review

# mumei dogfood: this workflow is a thin caller of the reusable
# harness-engineered review workflow (REQ-24). The reusable workflow owns the
# rubric, grounding, multi-perspective walk, bias-neutralization, and audit
# record. Keeping this caller in mumei means every PR to mumei exercises the
# exact same review path that other repositories invoke via `uses:`.
#
# Authenticate with a Claude Max subscription via CLAUDE_CODE_OAUTH_TOKEN
# (generate locally with `claude setup-token` and store as a repo secret).
# Do NOT also set ANTHROPIC_API_KEY: a static key takes precedence and would
# bill the API account.
#
# DISABLED: PR-time auto-run was turning PASS too early relative to other LLM
# reviewers (gemini-code-assist / chatgpt-codex-connector / copilot), so it
# was muting real findings. The workflow file is kept on disk for harness
# wiring and so the OAuth secret / job topology can be re-enabled by a
# one-line revert (restore the `pull_request` trigger below).
#
# Manual `gh workflow run claude-review.yml` will NOT work even though
# `workflow_dispatch` is the active trigger: the called reusable workflow
# (`review-reusable.yml`) has a Gate step that rejects any event other than
# `pull_request`. The dispatch trigger is here only to keep the workflow
# file syntactically valid (GitHub requires at least one `on:` event).

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by the action's GitHub token path (OIDC)

jobs:
  review:
    uses: ./.github/workflows/review-reusable.yml
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
