# Weekly digest of Claude Code platform updates with concrete proposals for
# how mumei should adapt. Files an issue (label: claude-code-update) only
# when there are actionable changes.
name: claude-code-updates

on:
  schedule:
    # Monday 22:00 UTC = Tuesday 07:00 JST (offset from audit-distribution-weekly)
    - cron: "0 22 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Opt into Node.js 24 for transitive JS actions (actions/setup-node,
# oven-sh/setup-bun) inside claude-code-base-action. Silences the Node 20
# deprecation warning until those actions publish Node 24-compatible tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: claude-code-updates
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/claude-code-updates.md
          model: opus
          max_turns: "30"
          # No WebFetch — its internal summarizer hits a discontinued Haiku
          # model and 404s. Use Bash(curl:*) instead per the prompt.
          # Disallow WebFetch explicitly: removing it from allowed_tools
          # alone is insufficient because the action's defaults include it.
          allowed_tools: "Read,Glob,Grep,Bash(curl:*),Bash(mkdir:*),Bash(gh issue:*),Bash(gh label:*)"
          disallowed_tools: "WebFetch"
