name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ─────────────────────────────────────────
      # bash の静的解析。GitHub Actions runner には shellcheck がプリインストール済。
      # ─────────────────────────────────────────
      - name: shellcheck (hooks/*.sh + hooks/_lib/*.sh)
        run: |
          shellcheck hooks/_lib/*.sh hooks/*.sh

      # ─────────────────────────────────────────
      # bash syntax check (shellcheck では拾えないケースの保険)
      # ─────────────────────────────────────────
      - name: bash -n
        run: |
          for f in hooks/_lib/*.sh hooks/*.sh; do
            bash -n "$f" || { echo "FAIL: $f"; exit 1; }
          done

      # ─────────────────────────────────────────
      # bash function prefix discipline (mumei_ / _mumei_ 必須)
      # tests/ は対象外 (bats fixture 関数があるため)
      # ─────────────────────────────────────────
      - name: verify mumei_ prefix on bash functions
        run: |
          set -euo pipefail
          bad="$(grep -hnE '^[a-zA-Z_][a-zA-Z0-9_]*\(\)' hooks/_lib/*.sh hooks/*.sh \
                 | grep -vE '^[0-9]+:(mumei_|_mumei_)' || true)"
          if [ -n "$bad" ]; then
            echo "::error::Non-prefixed function definitions found in hooks/:" >&2
            printf '%s\n' "$bad" >&2
            exit 1
          fi
          echo "all functions use mumei_ / _mumei_ prefix"

      # ─────────────────────────────────────────
      # JSON validation
      # ─────────────────────────────────────────
      - name: jq empty (manifest, hooks, schemas)
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty hooks/hooks.json
          jq empty skills/state/schemas/state.schema.json

      # ─────────────────────────────────────────
      # 配布物 frontmatter check
      # ─────────────────────────────────────────
      - name: agent frontmatter check
        run: |
          set -euo pipefail
          fail=0
          for f in agents/*.md; do
            # head -1 を bash 組み込み比較で確認 (grep は '---' をオプション扱いするため使わない)
            [[ "$(head -1 "$f")" == "---" ]] || { echo "FAIL: $f - missing frontmatter"; fail=1; continue; }
            fm="$(awk '/^---$/{c++; next} c==1' "$f")"
            for required in name description model; do
              printf '%s' "$fm" | grep -qE "^${required}:" || { echo "FAIL: $f - missing field: ${required}"; fail=1; }
            done
            for forbidden in hooks mcpServers permissionMode; do
              if printf '%s' "$fm" | grep -qE "^${forbidden}:"; then
                echo "FAIL: $f - forbidden plugin-agent field: ${forbidden}"
                fail=1
              fi
            done
          done
          [[ "$fail" == "0" ]]

      - name: skill frontmatter check
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            [[ "$(head -1 "$f")" == "---" ]] || { echo "FAIL: $f - missing frontmatter"; fail=1; continue; }
            fm="$(awk '/^---$/{c++; next} c==1' "$f")"
            printf '%s' "$fm" | grep -qE '^description:' || { echo "FAIL: $f - missing description"; fail=1; }
          done < <(find skills -name SKILL.md)
          [[ "$fail" == "0" ]]

      # ─────────────────────────────────────────
      # 配布物 README / LICENSE 存在確認
      # ─────────────────────────────────────────
      - name: required top-level files
        run: |
          [[ -f README.md ]] || { echo "FAIL: README.md missing"; exit 1; }
          [[ -f LICENSE ]] || { echo "FAIL: LICENSE missing"; exit 1; }
          [[ -f .claude-plugin/plugin.json ]] || { echo "FAIL: plugin.json missing"; exit 1; }

  # ─────────────────────────────────────────
  # bats による hook / _lib の単体テスト。
  # macos-latest と ubuntu-latest の matrix で BSD/GNU 差を検出する。
  # bats のバージョンは pin して両 OS 間の挙動差を抑える。
  # ─────────────────────────────────────────
  bats:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # bats-core を install.sh で直接入れる。bats-core/bats-action@3.0.0 は
      # 内部で actions/cache@v4 を使い Node 20 deprecation + tar restore failure
      # warning を出すため不採用。git clone shallow + sudo install.sh は両 OS
      # (ubuntu-latest, macos-latest) で動き、Node 依存も外せる。
      - name: install bats 1.11.0
        run: |
          git clone --depth 1 --branch v1.11.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      - name: bats tests/
        run: bats -r tests/
