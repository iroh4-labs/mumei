name: gemini-invoke

# Reusable Gemini free-form prompt workflow. Called by gemini-dispatch.yml
# when a comment starts with `@gemini-cli <prompt>` (anything except
# the structured `/review` / `/triage` commands).
#
# Use cases:
#   - "@gemini-cli explain why we use bash + jq instead of node"
#   - "@gemini-cli summarize the last 5 PRs and their decisions"
#   - "@gemini-cli compare hooks/_lib/state.sh and hooks/_lib/review.sh"

on:
  workflow_call:
    inputs:
      additional_context:
        type: string
        description: The user prompt extracted from the comment.
        required: false

concurrency:
  group: "${{ github.workflow }}-invoke-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Mint identity token
        id: mint_identity_token
        if: ${{ vars.APP_ID }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Prepare prompt context
        run: |
          mkdir -p .gemini
          jq -n \
            --arg title "${TITLE}" \
            --arg desc "${DESCRIPTION}" \
            --arg event "${EVENT_NAME}" \
            --arg pr "${IS_PULL_REQUEST}" \
            --arg num "${ISSUE_NUMBER}" \
            --arg repo "${REPOSITORY}" \
            --arg context "${ADDITIONAL_CONTEXT}" \
            '{title: $title, description: $desc, event_name: $event, is_pull_request: $pr, issue_number: $num, repository: $repo, additional_context: $context}' > .gemini/context.json
        env:
          TITLE: ${{ github.event.pull_request.title || github.event.issue.title }}
          DESCRIPTION: ${{ github.event.pull_request.body || github.event.issue.body }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PULL_REQUEST: ${{ !!github.event.pull_request }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          ADDITIONAL_CONTEXT: ${{ inputs.additional_context }}

      - name: Run Gemini CLI
        id: run_gemini
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          GITHUB_TOKEN: ${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION }}
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          workflow_name: gemini-invoke
          github_pr_number: ${{ github.event.pull_request.number }}
          github_issue_number: ${{ github.event.issue.number }}
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_issue_comment",
                    "issue_read",
                    "list_issues",
                    "search_issues",
                    "pull_request_read",
                    "list_pull_requests",
                    "search_pull_requests",
                    "get_commit",
                    "get_file_contents",
                    "list_commits",
                    "search_code"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          prompt: |-
            Use the GitHub MCP tools to respond to the user's request.
            Read the user prompt from .gemini/context.json (additional_context field).
            Reply by adding an issue/PR comment via the github MCP server.
