name: mutable-tag-guard

# Reject any pull request that introduces a third-party `uses:` reference
# pinned to a mutable target (a `vN` floating tag, `main`, `master`, or a
# named branch). All third-party actions must be pinned to a 40-char
# commit SHA with the version tag retained as a trailing comment, e.g.
# `uses: foo/bar@<sha> # v1.2.3`. This is the structural countermeasure
# to the tj-actions / Trivy-style supply-chain compromise pattern where a
# malicious force-push to a mutable tag rotates code under everyone's
# pinned `@v1` reference.
#
# Self-exclusion: this workflow file is excluded from the scan because
# the matching grep below would otherwise flag the example patterns
# embedded in this comment header.

on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Reject mutable `uses:` references
        run: |
          set -u
          shopt -s nullglob

          # Files to scan: every workflow except this guard itself.
          mapfile -t files < <(
            find .github/workflows -maxdepth 1 -type f \
              \( -name '*.yml' -o -name '*.yaml' \) \
              ! -name 'mutable-tag-guard.yml' \
              | sort
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "no workflow files to scan"
            exit 0
          fi

          # A `uses:` line is mutable if it ends in `@vN` (single major
          # tag), `@main`, `@master`, or `@<bareword>` (branch name).
          # Lines pinned to a 40-char SHA with optional comment are OK.
          # Local action references (`./.github/...` or `./...`) are
          # exempt by virtue of starting with `./`.
          mutable_pattern='uses:[[:space:]]+[^/[:space:]]+/[^@[:space:]]+@(v[0-9]+|main|master|[a-zA-Z][a-zA-Z0-9_-]*)[[:space:]]*$'

          violations="$(grep -nE "$mutable_pattern" "${files[@]}" || true)"
          if [ -n "$violations" ]; then
            echo "::error::Mutable uses: references detected. Pin to a 40-char commit SHA."
            echo "$violations"
            exit 1
          fi

          echo "all uses: references are SHA-pinned"
