<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#363636" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ede2c9" media="(prefers-color-scheme: light)" />
    <title>mumei dashboard</title>
    <script>
      // Set initial theme before React mounts to avoid flash. Mirrors src/hooks/useTheme.ts.
      (function () {
        try {
          var t = localStorage.getItem('mumei-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.toggle('dark', t === 'dark');
          document.documentElement.style.colorScheme = t;
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
